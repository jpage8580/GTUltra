name: Build macOS

on:
  push:
    branches: [new-emulators]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install dependencies
        run: brew install sdl2 sdl2_ttf

      - name: Build
        run: make mac-build

      - name: Verify goatdata.c determinism
        run: bash tests/integration/check-goatdata.sh

      - name: Run smoke tests
        timeout-minutes: 1
        run: bash tests/integration/smoke.sh mac/ ""
